<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #f8fafc;
        min-height: 100vh;
        padding: 1.5rem;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: 1.5rem;
      }

      #chat-container {
        max-width: 600px;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      #chat-messages {
        min-height: 320px;
        max-height: 60vh;
        overflow-y: auto;
        padding: 1rem;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .message {
        max-width: 75%;
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        word-break: break-word;
      }

      .message.sent {
        align-self: flex-end;
        background: #3b82f6;
        color: #fff;
      }

      .message.received {
        align-self: flex-start;
        background: #334155;
        color: #f8fafc;
      }

      #chat-form {
        display: flex;
        gap: 0.5rem;
      }

      #message-input {
        flex: 1;
        padding: 0.6rem 0.75rem;
        border: 1px solid #475569;
        border-radius: 6px;
        background: #1e293b;
        color: #f8fafc;
      }

      #send-button {
        padding: 0.6rem 1rem;
        border: none;
        border-radius: 6px;
        background: #3b82f6;
        color: #fff;
        cursor: pointer;
      }

      #send-button:hover {
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    <h1>Chat App</h1>

    <div id="chat-container">
      <div id="chat-messages"></div>
      <form id="chat-form">
        <input type="text" id="message-input" placeholder="Message" />
        <button type="submit" id="send-button">Send</button>
      </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const chatForm = document.getElementById("chat-form");
      const messageInput = document.getElementById("message-input");
      const chatMessages = document.getElementById("chat-messages");

      chatForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const message = messageInput.value.trim();
        if (!message) return;

        socket.emit("user-message", message);
        messageInput.value = "";
      });

      socket.on("message", ({ text, senderId, type }) => {
        const div = document.createElement("div");
        const isOwnMessage = type === "user" && senderId === socket.id;
        div.className = `message ${isOwnMessage ? "sent" : "received"}`;
        div.textContent = text;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });
    </script>
  </body>
</html>
